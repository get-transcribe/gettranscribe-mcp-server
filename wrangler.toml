name = "gettranscribe-mcp-server"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GETTRANSCRIBE_API_URL = "https://api.gettranscribe.ai"
MCP_PATH = "/mcp"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "f7fe61aa6a2c42179690b1112a8f30b6"

# Secrets (set via: wrangler secret put <NAME>):
# COOKIE_SECRET — random string for HMAC signing cookies (required for OAuth)
